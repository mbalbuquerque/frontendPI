<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Coordenador - UP Digital</title>
    <link rel="stylesheet" href="../css/perfilcoordenador.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <aside class="sidebar" id="sidebar">
            <div class="menu-icon" id="menuBtn">
                <i class="fas fa-bars"></i>
            </div>
            <nav>
                <ul>
                    <li id="btnInicio"><i class="fas fa-home"></i> <span>INÍCIO</span></li>
                    <li id="btnConta"><i class="fas fa-user"></i> <span>CONTA</span></li>
                    <li id="btnArquivos"><i class="fas fa-folder"></i> <span>ARQUIVOS</span></li>
                    <li id="btnRegras"><i class="fas fa-file-contract"></i> <span>REGRAS</span></li>
                    <li id="btnDashboard"><i class="fas fa-chart-bar"></i> <span>DASHBOARD</span></li>
                    <li class="logout" id="btnLogout">
                <i class="fas fa-times-circle"></i> <span>SAIR</span>
            </li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <h1>PERFIL</h1>

            <section class="profile-card">
                <form class="profile-form">
                    <div class="input-group full-width">
                        <label>NOME</label>
                        <input type="text" placeholder="Digite seu nome completo">
                    </div>

                    <div class="input-group">
                        <label>SETOR</label>
                        <input type="text">
                    </div>

                    <div class="input-group">
                        <label>E-MAIL</label>
                        <input type="email">
                    </div>

                    <div class="input-group">
                        <label>MATRÍCULA</label>
                        <input type="text">
                    </div>

                    <div class="input-group">
                        </div>

                    <div class="input-group">
                        <label>Senha</label>
                        <input type="password">
                    </div>

                    <div class="input-group">
                        <label>Alterar Senha</label>
                        <input type="password">
                    </div>

                    <button type="submit" class="btn-save">SALVAR</button>
                </form>
            </section>

            <div class="action-buttons">
    <a href="../html/cadastroaluno.html" style="text-decoration: none;">
        <button class="btn-outline">CADASTRAR ALUNO</button>
    </a>

    
</div>
            
            <div class="decoration-circle"></div>
            <div class="decoration-circle2"></div>
        </main>
    </div>

    <script src="../js/script.js"></script>
</body>
</html>
