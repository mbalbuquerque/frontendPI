<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Curso - UP Digital</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
   
    <link rel="stylesheet" href="../css/cadastrocursoeregras.css">

    <style>
        
    </style>
</head>
<body>
    <div class="container">
        <aside class="sidebar" id="sidebar">
            <div class="menu-icon" id="menuBtn"><i class="fas fa-bars"></i></div>
            <nav>
                <ul>
                    <li id="btnInicio"><i class="fas fa-home"></i> <span>INÍCIO</span></li>
                    <li id="btnConta"><i class="fas fa-user"></i> <span>CONTA</span></li>
                    <li id="btnArquivos"><i class="fas fa-folder"></i> <span>ARQUIVOS</span></li>
                    <li id="btnRegras" class="active"><i class="fas fa-file-contract"></i> <span>REGRAS</span></li>
                    <li id="btnDashboard"><i class="fas fa-chart-bar"></i> <span>DASHBOARD</span></li>
                    <li class="logout" id="btnLogout">
                        <i class="fas fa-times-circle"></i> <span>SAIR</span>
                    </li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <h1>CURSO</h1>

            <section class="form-container-azul" id="containerPrincipal">
                <div class="search-header-excel">
                    <div class="input-search">
                        <input type="text" placeholder="PESQUISAR CURSO..." id="inputBusca">
                        <i class="fas fa-search"></i>
                    </div>
                    <button class="btn-novo-curso" onclick="abrirModalAcao('edit', 'Novo Curso')">+ CURSO</button>
                </div>

                <div class="tabela-excel-wrapper">
                    <table class="excel-grid">
                        <thead>
                            <tr>
                                <th>NOME</th>
                                <th>HORÁRIO (CARGA)</th>
                                <th>AÇÕES</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>ADS</td>
                                <td>200</td>
                                <td class="actions-cell">
                                    <button class="btn-acao-quadrado green" title="Adicionar Regra" onclick="abrirModalAcao('add', 'ADS')">+</button>
                                    <button class="btn-acao-quadrado blue" title="Editar" onclick="abrirModalAcao('edit', 'ADS')">|</button>
                                    <button class="btn-acao-quadrado orange" title="Excluir" onclick="abrirModalAcao('delete', 'ADS')">!</button>
                                </td>
                            </tr>
                            <tr>
                                <td>MBA</td>
                                <td>100</td>
                                <td class="actions-cell">
                                    <button class="btn-acao-quadrado green" title="Adicionar Regra" onclick="abrirModalAcao('add', 'MBA')">+</button>
                                    <button class="btn-acao-quadrado blue" title="Editar" onclick="abrirModalAcao('edit', 'MBA')">|</button>
                                    <button class="btn-acao-quadrado orange" title="Excluir" onclick="abrirModalAcao('delete', 'MBA')">!</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="modalAcao" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Título</h2>
                <span class="close-modal" onclick="fecharModal()">&times;</span>
            </div>
            <hr>
            <div id="modalBody" class="modal-body">
                </div>
        </div>
    </div>

    <script src="../js/script.js"></script>
    <script>
        function abrirModalAcao(tipo, curso) {
            const modal = document.getElementById('modalAcao');
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');
            
            if(!modal) return;

            // Define o display como flex para centralizar
            modal.style.display = 'flex';
            body.innerHTML = ''; 

            if (tipo === 'add') {
                title.innerText = `Regras - ${curso}`;
                body.innerHTML = `
                    <label>Tipo de Regra</label>
                    <select id="tipoRegra">
                        <option value="complementar">Carga Horária Complementar</option>
                        <option value="workshop">Workshop</option>
                        <option value="palestra">Palestra</option>
                        <option value="monitoria">Monitoria</option>
                        <option value="estagio">Estágio</option>
                    </select>
                    <label>Horas Sugeridas</label>
                    <input type="number" id="horasRegra" placeholder="Ex: 20">
                    <button class="btn-confirmar" style="background: #28a745;" onclick="fecharModal()">SALVAR REGRA</button>
                `;
            } else if (tipo === 'edit') {
                title.innerText = `Editar: ${curso}`;
                body.innerHTML = `
                    <label>Nome do Curso</label>
                    <input type="text" value="${curso === 'Novo Curso' ? '' : curso}">
                    <label>Carga Horária</label>
                    <input type="number" placeholder="Total de horas">
                    <button class="btn-confirmar" style="background: #007bff;" onclick="fecharModal()">ATUALIZAR</button>
                `;
            } else if (tipo === 'delete') {
                title.innerText = 'Confirmar Exclusão';
                body.innerHTML = `
                    <p style="margin-top:15px;">Deseja realmente excluir o curso <strong>${curso}</strong>?</p>
                    <button class="btn-confirmar" style="background: #ff8c00;" onclick="fecharModal()">SIM, EXCLUIR</button>
                `;
            }
        }

        function fecharModal() {
            document.getElementById('modalAcao').style.display = 'none';
        }

        // Fecha o modal ao clicar na área escura (overlay)
        window.onclick = function(event) {
            const modal = document.getElementById('modalAcao');
            if (event.target == modal) {
                fecharModal();
            }
        }
    </script>
</body>
</html>
