<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regras - UP Digital</title>
    <link rel="stylesheet" href="../css/visualizacaoderegrascoordenador.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <aside class="sidebar" id="sidebar">
            <div class="menu-icon" id="menuBtn"><i class="fas fa-bars"></i></div>
            <nav>
                <ul>
                    <li id="btnInicio"><i class="fas fa-home"></i> <span>INÍCIO</span></li>
                    <li id="btnConta"><i class="fas fa-user"></i> <span>CONTA</span></li>
                    <li id="btnArquivos"><i class="fas fa-folder"></i> <span>ARQUIVOS</span></li>
                    <li id="btnRegras"><i class="fas fa-file-contract"></i> <span>REGRAS</span></li>
                    <li id="btnDashboard"><i class="fas fa-chart-bar"></i> <span>DASHBOARD</span></li>
                    <li class="logout" id="btnLogout">
                        <i class="fas fa-times-circle"></i> <span>SAIR</span>
                    </li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <h1>REGRAS</h1>

            <div class="regras-container-grid">
                <section class="form-container-azul card-regras">
                    <h3>CURSO</h3>
                    <div class="input-search">
                        <input type="text" placeholder="CURSO">
                        <i class="fas fa-search"></i>
                    </div>
                    <div class="display-box-regras">
                        <label>CARGA HORÁRIA TOTAL</label>
                        <div class="display-box"></div>
                    </div>
                    <div class="display-box-regras">
                        <label>CARGA HORÁRIA SEMESTRAL</label>
                        <div class="display-box"></div>
                    </div>
                </section>

                <section class="form-container-azul card-regras">
                    <h3>ATIVIDADE</h3>
                    <div class="input-group">
                        <select class="custom-select">
                            <option value="">SELECIONE A ATIVIDADE</option>
                            <option value="palestras">Palestras</option>
                            <option value="congressos">Congressos</option>
                            <option value="seminarios">Seminários</option>
                            <option value="iniciacao">Iniciação Científica e Monitoria</option>
                            <option value="hackathons">Hackathons</option>
                            <option value="moda">Eventos de moda (feiras e desfiles)</option>
                        </select>
                    </div>
                    <div class="display-box-regras">
                        <label>CARGA HORÁRIA POR SEMESTRE</label>
                        <div class="display-box" style="height: 100px;"></div>
                    </div>
                </section>
            </div>

            <div class="circle-orange"></div>
            <div class="circle-blue"></div>
        </main>
    </div>

    <script src="../js/script.js"></script>
</body>
</html>
