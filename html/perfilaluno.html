<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - UP Digital</title>
    <link rel="stylesheet" href="../css/perfilaluno.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <aside class="sidebar" id="sidebar">
            <div class="menu-icon" id="menuBtn">
                <i class="fas fa-bars"></i>
            </div>
            <nav>
                <ul>
                    <li id="btnInicio"><i class="fas fa-home"></i> <span>INÍCIO</span></li>
                    <li id="btnConta"><i class="fas fa-user"></i> <span>CONTA</span></li>
                    <li id="btnArquivos"><i class="fas fa-folder"></i> <span>ARQUIVOS</span></li>
                    <li id="btnRegras"><i class="fas fa-file-contract"></i> <span>REGRAS</span></li>
                    <li id="btnDashboard"><i class="fas fa-chart-bar"></i> <span>DASHBOARD</span></li>
                    <li class="logout" id="btnLogout">
                        <i class="fas fa-times-circle"></i> <span>SAIR</span>
                    </li>
                </ul>   
            </nav>
        </aside>

        <main class="main-content">
            <h1>PERFIL</h1>

            <section class="profile-card">
                <div class="profile-form">
                    <div class="input-group full-width">
                        <label>ALUNO</label>
                        <input type="text" placeholder="NOME COMPLETO">
                    </div>

                    <div class="input-search">
                        <label>CURSO</label>
                        <input type="text" id="inputBuscaCurso" placeholder="PESQUISAR CURSO MATRICULADO">
                        <i class="fas fa-search" id="lupaBusca" title="Clique para buscar"></i>
                    </div>

                    <div class="input-group">
                        <label>PERÍODO</label>
                        <input type="text" placeholder="EX: 5º PERÍODO">
                    </div>

                    <div class="input-group">
                        <label>TURMA</label>
                        <input type="text" placeholder="TURMA">
                    </div>

                    <div class="input-group">
                        <label>TURNO</label>
                        <input type="text" placeholder="TURNO">
                    </div>

                    <div class="input-group">
                        <label>E-MAIL</label>
                        <input type="email" placeholder="E-MAIL INSTITUCIONAL">
                    </div>

                    <div class="input-group">
                        <label>MATRÍCULA</label>
                        <input type="text" placeholder="Nº MATRÍCULA">
                    </div>

                    <div class="input-group">
                        <label>SENHA</label>
                        <input type="password" placeholder="********">
                    </div>

                    <div class="input-group">
                        <label>ALTERAR SENHA</label>
                        <input type="password" placeholder="NOVA SENHA">
                    </div>
                </div>
            </section>

           
            <div class="action-buttons-footer">
                <button class="btn-footer blue" id="btnSalvar">SALVAR</button>
                
            </div>

            <div class="circle-orange"></div>
            <div class="circle-blue"></div>
        </main>
    </div>

    <script src="../js/script.js"></script>
</body>
</html>
